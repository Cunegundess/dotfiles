#--------------------------------------------------------------------------
# Vesper — tmux theme
# Peppermint & orange dark theme, port de raunofreiberg/vesper
# Design minimalista: sem powerline, sem ruído. Cor só onde importa.
#--------------------------------------------------------------------------

# Paleta ------------------------------------------------------------------
# Definida como variáveis tmux (suportado desde tmux 3.2 via %hidden),
# assim qualquer ajuste de cor é feito num lugar só.

%hidden vesper_bg="#101010"        # background base
%hidden vesper_bg_alt="#161616"    # painéis / popups
%hidden vesper_bg_float="#1c1c1c"  # menus / prompts
%hidden vesper_fg="#e6e6e6"        # texto primário
%hidden vesper_fg_dim="#6e6e6e"    # texto secundário / inativo
%hidden vesper_border="#2a2a2a"    # bordas sutis
%hidden vesper_accent="#ffc799"    # peach — accent principal
%hidden vesper_green="#99ffe4"     # mint — sucesso / git limpo
%hidden vesper_red="#ff8080"       # alerta / git sujo / prefix ativo

#--------------------------------------------------------------------------
# Status bar
#--------------------------------------------------------------------------
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-interval 5
set -g status-style "bg=$vesper_bg,fg=$vesper_fg"

# tamanhos generosos o bastante pra caber path + git sem cortar
set -g status-left-length 40
set -g status-right-length 90

# --- esquerda: sessão -----------------------------------------------------
# nome da sessão em accent, sem caixa/pílula — só peso e cor fazem o trabalho
set -g status-left "#[fg=$vesper_accent,bold]  #S #[fg=$vesper_border]│ "

# --- janelas ---------------------------------------------------------------
# inativa: apagada, sem numeração em destaque
# ativa: só accent + negrito faz a diferença — vira vermelho quando o
# prefixo está pressionado, como lembrete discreto de que o tmux "escutou"
# 🔍 aparece quando o pane está com zoom (prefix+z)
setw -g window-status-format "#[fg=$vesper_fg_dim] #{window_index}:#{window_name}#{?window_flags,#{window_flags}, } "
setw -g window-status-current-format "#{?client_prefix,#[fg=$vesper_red],#[fg=$vesper_accent,bold]} #{window_index}:#{window_name}#{?window_zoomed_flag, 🔍,}#{?window_flags,#{window_flags}, } "
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=$vesper_red"
setw -g window-status-bell-style "fg=$vesper_red,bold"

# --- direita: git · path · cpu/ram · ip · relógio ---------------------------
# git_status.sh: branch atual + ● vermelho se houver mudanças não commitadas
# sysinfo.sh: CPU% e RAM usada/total, sem travar o refresh da status bar
set -g status-right "#[fg=$vesper_green]#(bash ~/.config/tmux/scripts/tmux-git-status.sh #{pane_current_path})#[fg=$vesper_border] │#[fg=$vesper_fg_dim] #{b:pane_current_path}#[fg=$vesper_border] │#[fg=$vesper_fg_dim] #(bash ~/.config/tmux/scripts/tmux-sys-info.sh)#[fg=$vesper_border] │#[fg=$vesper_fg_dim] 󰍎 #(hostname -I | awk '{print \$1}')#[fg=$vesper_border] │#[fg=$vesper_fg] %H:%M #[fg=$vesper_border]│#[fg=$vesper_fg_dim] %d/%m "

#--------------------------------------------------------------------------
# Pane borders
#--------------------------------------------------------------------------
set -g pane-border-style "fg=$vesper_border"
set -g pane-active-border-style "fg=$vesper_accent"
set -g pane-border-lines single

#--------------------------------------------------------------------------
# Mensagens, prompt de comando e clock-mode
#--------------------------------------------------------------------------
set -g message-style "bg=$vesper_bg_float,fg=$vesper_accent"
set -g message-command-style "bg=$vesper_bg_float,fg=$vesper_fg"
setw -g clock-mode-colour "$vesper_accent"
setw -g clock-mode-style 24

#--------------------------------------------------------------------------
# Modo cópia (vi) — seleção com o accent, igual ao Visual do Vesper no nvim
#--------------------------------------------------------------------------
setw -g mode-style "bg=$vesper_accent,fg=$vesper_bg"

#--------------------------------------------------------------------------
# Popups e menus (usado por display-popup, tmux-fzf, command-palette)
#--------------------------------------------------------------------------
set -g popup-style "bg=$vesper_bg_alt,fg=$vesper_fg"
set -g popup-border-style "fg=$vesper_border"
set -g popup-border-lines rounded

set -g menu-style "bg=$vesper_bg_float,fg=$vesper_fg"
set -g menu-selected-style "bg=$vesper_accent,fg=$vesper_bg"
set -g menu-border-style "fg=$vesper_border"
set -g menu-border-lines rounded
