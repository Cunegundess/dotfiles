# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

#: Shell & Scrollback

shell_integration enabled
scrollback_pager_history_size 100
scrollback_pager nvim -u NONE -c "setlocal nonumber norelativenumber" -c "silent write! /tmp/kitty_scrollback_buffer | te cat /tmp/kitty_scrollback_buffer - "

#: Clipboard & Copy

clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
copy_on_select clipboard
clear_selection_on_clipboard_loss clipboard

#: Remote Control

allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

#: Layout

enabled_layouts tall,grid,horizontal,vertical,fat,stack
remember_window_size yes

#: Window

confirm_os_window_close 0
# window_padding_width 10
window_margin_width 5
enable_audio_bell no

#: Cursor

mouse_hide_wait 3.0
cursor_shape block
cursor_blink true
cursor_trail 10
cursor_trail_start_threshold 0
cursor_trail_decay 0.01 0.05

#: Tab Bar — Vesper style

tab_bar_style powerline
tab_powerline_style round
tab_bar_align left
tab_bar_edge top
tab_bar_min_tabs 1
tab_bar_margin_height 2 0
tab_bar_background #101010
tab_separator " "
tab_title_max_length 30

tab_bar_template "{fmt.fg=#6e6e6e}{fmt.bg=#101010} {cwd_current} {fmt.fg=#2a2a2a}│{fmt.fg=#99ffe4} #(bash ~/.config/kitty/scripts/kitty-git-status.sh) {fmt.fg=#2a2a2a}│{fmt.fg=#6e6e6e}#(bash ~/.config/kitty/scripts/kitty-sys-info.sh) {fmt.fg=#2a2a2a}│{fmt.fg=#e6e6e6}{clock} {fmt.fg=#2a2a2a}│{fmt.fg=#ffc799} {tabs}"
active_tab_title_template "{fmt.fg=#101010}{fmt.bg=#ffc799}{fmt.bold} {title} {fmt.nobold}"
inactive_tab_title_template "{fmt.fg=#6e6e6e}{fmt.bg=#161616} {title}"

#: Keybindings — Vim-like (kitty_mod = ctrl+shift by default)

clear_all_shortcuts

#: Navigation — h/j/k/l
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+l neighboring_window right

#: Splits — like vim :sp / :vsp
map kitty_mod+\ launch --type=window --cwd=current zsh
map kitty_mod+- launch --type=window --cwd=current zsh

#: Windows & Tabs
map kitty_mod+w close_window
map kitty_mod+enter new_window
map kitty_mod+t new_tab
map kitty_mod+] next_tab
map kitty_mod+[ previous_tab

#: Resize (repeatable)
map kitty_mod+shift+h resize_window narrower
map kitty_mod+shift+l resize_window wider
map kitty_mod+shift+k resize_window taller
map kitty_mod+shift+j resize_window shorter

#: Scroll — vim-like u/d/g/G
map kitty_mod+u scroll_page_up
map kitty_mod+d scroll_page_down
map kitty_mod+g scroll_home
map kitty_mod+shift+g scroll_end

#: Session
map kitty_mod+s launch --type=overlay bash ~/.config/kitty/kitty-sessionizer.sh

#: Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

#: Layouts
map kitty_mod+1 goto-layout tall
map kitty_mod+2 goto-layout grid
map kitty_mod+3 goto-layout horizontal
map kitty_mod+4 goto-layout vertical
map kitty_mod+5 goto-layout stack

#: Command Palette — como VS Code / neovim
map ctrl+shift+p command_palette

#: System — reload config, debug, fullscreen
map ctrl+shift+f5  load_config_file
map ctrl+shift+f6  debug_config
map ctrl+shift+f11 toggle_fullscreen
map ctrl+shift+f2  edit_config_file
map ctrl+shift+f10 toggle_maximized
map ctrl+shift+escape kitty_shell window

#: Font size
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0
